name: Signal Relay

on:
  schedule:
    - cron: "*/1 * * * *"   # every minute
  workflow_dispatch:        # allow manual trigger

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new signal
        id: check
        run: |
          SIGNAL=$(curl -s https://sdebbian-matrix-telegram-core.hf.space/latest_signal)
          echo "signal=$SIGNAL" >> $GITHUB_OUTPUT
          if [ -f last_signal.txt ]; then
            OLD=$(cat last_signal.txt)
            if [ "$SIGNAL" != "$OLD" ]; then
              echo "new=true" >> $GITHUB_OUTPUT
            else
              echo "new=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi
          echo "$SIGNAL" > last_signal.txt
      - name: Send to Telegram
        if: steps.check.outputs.new == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>New signal:</b> ${{ steps.check.outputs.signal }}"
      - name: Send to Discord
        if: steps.check.outputs.new == 'true'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"**New signal:** ${{ steps.check.outputs.signal }}\"}"
